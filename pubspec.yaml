name: one_guntha
description: 1Guntha real estate mobile app — MVP client for the Spring Boot API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0
  flutter_html: ^3.0.0
  webview_flutter: ^4.10.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/1G_logo.png
    - assets/images/1G_logo_full.png
    - assets/images/1G_logo_lockup.png
    - assets/images/1G_logo_lockup@2x.png
    - assets/images/1G_logo_lockup@3x.png
    - assets/images/1G_logo_symbol.png
    - assets/images/1G_logo_symbol@2x.png
    - assets/images/1G_logo_symbol@3x.png
    - assets/images/1G_logo_mark.png
    - assets/images/1G_logo_mark@2x.png
    - assets/images/1G_logo_mark@3x.png
    - assets/images/1G_logo_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/1G_logo_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/1G_logo_icon.png
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
